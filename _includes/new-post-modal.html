<div id="new-post-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;">
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:8px;width:90%;max-width:600px;max-height:80vh;overflow:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
      <h3 style="margin:0;">New Post</h3>
      <span id="close-modal" style="cursor:pointer;font-size:24px;">&times;</span>
    </div>
    <div id="token-section" style="margin-bottom:15px;">
      <label>GitHub Token:</label>
      <input type="password" id="gh-token" style="width:100%;padding:8px;margin-top:5px;box-sizing:border-box;" placeholder="ghp_...">
      <small style="color:#666;">需要 repo 权限，保存在本地浏览器</small>
    </div>
    <div style="margin-bottom:15px;">
      <label>标题:</label>
      <input type="text" id="post-title" style="width:100%;padding:8px;margin-top:5px;box-sizing:border-box;" placeholder="例如: a">
    </div>
    <div style="margin-bottom:15px;">
      <label>内容:</label>
      <textarea id="post-content" style="width:100%;height:200px;padding:8px;margin-top:5px;box-sizing:border-box;resize:vertical;"></textarea>
    </div>
    <div style="text-align:right;">
      <button id="publish-btn" style="padding:10px 20px;background:#28a745;color:#fff;border:none;border-radius:4px;cursor:pointer;">发布</button>
    </div>
    <div id="publish-status" style="margin-top:10px;"></div>
  </div>
</div>

<script>
(function() {
  const REPO_OWNER = 'potato3822';
  const REPO_NAME = 'diary';
  const BRANCH = 'master';

  const siteTitle = document.querySelector('.site-title');
  const newBtn = document.getElementById('new-post-btn');
  const modal = document.getElementById('new-post-modal');
  const closeBtn = document.getElementById('close-modal');
  const publishBtn = document.getElementById('publish-btn');
  const tokenInput = document.getElementById('gh-token');
  const titleInput = document.getElementById('post-title');
  const contentInput = document.getElementById('post-content');
  const statusDiv = document.getElementById('publish-status');
  const tokenSection = document.getElementById('token-section');

  if (siteTitle) {
    siteTitle.addEventListener('dblclick', function(e) {
      e.preventDefault();
      if (newBtn) newBtn.style.display = newBtn.style.display === 'none' ? 'inline' : 'none';
    });
  }

  if (newBtn) {
    newBtn.addEventListener('click', function() {
      const savedToken = localStorage.getItem('gh_token');
      if (savedToken) {
        tokenInput.value = savedToken;
        tokenSection.style.display = 'none';
      } else {
        tokenSection.style.display = 'block';
      }
      titleInput.value = '';
      contentInput.value = '';
      statusDiv.textContent = '';
      modal.style.display = 'block';
    });
  }

  if (closeBtn) {
    closeBtn.addEventListener('click', function() {
      modal.style.display = 'none';
    });
  }

  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      modal.style.display = 'none';
    }
  });

  if (publishBtn) {
    publishBtn.addEventListener('click', async function() {
      const token = tokenInput.value.trim();
      const title = titleInput.value.trim();
      const content = contentInput.value;

      if (!token) {
        statusDiv.textContent = '请输入 GitHub Token';
        statusDiv.style.color = 'red';
        return;
      }
      if (!title) {
        statusDiv.textContent = '请输入标题';
        statusDiv.style.color = 'red';
        return;
      }

      localStorage.setItem('gh_token', token);

      const now = new Date();
      const dateStr = now.toISOString().split('T')[0];
      const filename = `${dateStr}-${title}.md`;
      const path = `_posts/${filename}`;

      const frontMatter = `---
title: "${title}"
date: ${dateStr}
layout: post
---

${content}`;

      statusDiv.textContent = '发布中...';
      statusDiv.style.color = '#666';
      publishBtn.disabled = true;

      try {
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: `Add post: ${title}`,
            content: btoa(unescape(encodeURIComponent(frontMatter))),
            branch: BRANCH
          })
        });

        if (response.ok) {
          statusDiv.textContent = '发布成功！页面将在几分钟后更新。';
          statusDiv.style.color = 'green';
          setTimeout(() => {
            modal.style.display = 'none';
          }, 2000);
        } else {
          const err = await response.json();
          statusDiv.textContent = `发布失败: ${err.message}`;
          statusDiv.style.color = 'red';
        }
      } catch (e) {
        statusDiv.textContent = `发布失败: ${e.message}`;
        statusDiv.style.color = 'red';
      }

      publishBtn.disabled = false;
    });
  }
})();
</script>
